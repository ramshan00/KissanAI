name: Build Flutter Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: |
          cd frontend
          flutter create .
          flutter pub get

      - name: Build APK
        run: |
          cd frontend
          flutter build apk --release --dart-define=API_URL=https://ramsha00-kissanai.hf.space

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: kissanai-apk
          path: frontend/build/app/outputs/flutter-apk/app-release.apk
