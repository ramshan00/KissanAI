name: Build Flutter APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows you to manually trigger the build

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Generate Android Platform Files
        working-directory: ./frontend
        run: |
          # Since the 'android' folder is missing, we need to generate it
          flutter create --org com.kissanapp --platforms android .
          
      - name: Install Dependencies
        working-directory: ./frontend
        run: flutter pub get

      - name: Build APK
        working-directory: ./frontend
        run: flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: kissanapp-release-apk
          path: frontend/build/app/outputs/flutter-apk/app-release.apk
